services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_BASE_PATH: /dday
    container_name: dday2026-app
    restart: unless-stopped
    network_mode: host          # container shares host network → can reach 127.0.0.1:27017 (systemd mongod)
    environment:
      NODE_ENV: production
      PORT: 5005
      BASE_PATH: /dday
      FRONTEND_ROOT: https://iitg.ac.in/dday
      MONGO_URI: mongodb://127.0.0.1:27017/dday2026   # overrides whatever is in .env
    env_file:
      - .env                    # loads JWT_SECRET, OAuth keys, SMTP, etc.

  # Only used if you ever need a containerised Mongo (e.g. local dev without systemd).
  # Run with:  docker compose --profile with-mongo up
  mongo:
    image: mongo:7
    container_name: dday2026-mongo
    profiles: ["with-mongo"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
